services:
  noise-fundamentals:
    build:
      context: ./01-noise-fundamentals
    container_name: noise_fundamentals
    ports:
      - "5174:5174"
    volumes:
      - ./01-noise-fundamentals:/app
      - noise_fundamentals_modules:/app/node_modules
    networks:
      - app-network

  2d-terrain:
    build:
      context: ./02-2d-terrain
    container_name: 2d_terrain
    ports:
      - "5175:5175"
    volumes:
      - ./02-2d-terrain:/app
      - 2d_terrain_modules:/app/node_modules
    networks:
      - app-network

  tilemap-world:
    build:
      context: ./03-tilemap-world
    container_name: tilemap_world
    ports:
      - "5176:5176"
    volumes:
      - ./03-tilemap-world:/app
      - tilemap_world_modules:/app/node_modules
    networks:
      - app-network

  3d-voxel-terrain:
    build:
      context: ./04-3d-voxel-terrain
    container_name: 3d_voxel_terrain
    ports:
      - "5177:5177"
    volumes:
      - ./04-3d-voxel-terrain:/app
      - 3d_voxel_terrain_modules:/app/node_modules
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: maestre-web_app-network

volumes:
  noise_fundamentals_modules:
  2d_terrain_modules:
  tilemap_world_modules:
  3d_voxel_terrain_modules:
